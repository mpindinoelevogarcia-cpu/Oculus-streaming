<!DOCTYPE html>
<html lang="pt">

        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background-color: #1a1a1a; color: #888; }
        .btn-reject { background-color: #e74c3c; color: #fff; padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>

</html>
