<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oculus Streaming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #141414; color: #fff; overflow-x: hidden; display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
        
        .container { display: flex; max-width: 1000px; width: 100%; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .left-panel { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(135deg, #141414 0%, #070707 100%); }
        .right-panel { flex: 1; padding: 60px; background-color: #141414; display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #222; }
        
        .logo { font-size: 32px; font-weight: 900; color: #e50914; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .main-title { font-size: 36px; font-weight: bold; line-height: 1.2; margin-bottom: 30px; }
        .pub-space { background-color: #0c0c0c; border: 1px dashed #333; height: 180px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 14px; }
        
        h2 { font-size: 24px; margin-bottom: 8px; font-weight: bold; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px; background-color: #0c0c0c; border: 1px solid #333; border-radius: 4px; color: white; font-size: 14px; }
        input:focus { border-color: #e50914; outline: none; }
        
        .checkbox-group { display: none; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 13px; color: #ccc; }
        .checkbox-group input { width: 18px; height: 18px; accent-color: #e50914; cursor: pointer; }
        
        .btn-submit { width: 100%; padding: 14px; background-color: #e50914; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background-color: #b80710; }
        
        .toggle-form { margin-top: 25px; text-align: center; font-size: 13px; color: #888; }
        .toggle-link { color: #e50914; cursor: pointer; text-decoration: none; font-weight: bold; }
        .toggle-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Lado Esquerdo: Publicidade e Texto -->
        <div class="left-panel">
            <div class="logo">Oculus</div>
            <div class="main-title">520 prémio Conecte-se com a comunidade sonora do amanhã.</div>
            <div class="pub-space">👁️ Espaço de Publicidade Oculus</div>
        </div>
        
        <!-- Lado Direito: Formulário Corrigido -->
        <div class="right-panel">
            <h2 id="formTitle">Entrar no Oculus</h2>
            <div id="formSubtitle" class="subtitle">Aceda à sua conta de ouvinte, artista ou painel master.</div>
            
            <form id="loginForm">
                <div class="form-group" id="phoneContainer" style="display: none;">
                    <label>Número de Telefone Opcional</label>
                    <input type="text" id="userPhone" placeholder="Ex: +244 9xx xxx xxx">
                </div>

                <!-- CAMPO CORRIGIDO AQUI -->
                <div class="form-group">
                    E-mail ou Telemóvel</label>
                    
                </div>
                
                <div class="form-group">
                    <label>Palavra-passe</label>
                    <input type="password" id="userPassword" required placeholder="Digite a sua senha">
                </div>

                <!-- Escolha secreta para os músicos no registo -->
                <div class="checkbox-group" id="artistCheckboxContainer">
                    <input type="checkbox" id="isArtistProfile">
                    <label for="isArtistProfile" style="display:inline; text-transform:none; color:#fff; cursor:pointer; font-weight:normal;">Quero criar um perfil artístico (Músico)</label>
                </div>
                
                <button type="submit" class="btn-submit" id="btnAction">Entrar</button>
            </form>
            
            <div class="toggle-form">
                <span id="toggleQuestion">Novo no Oculus?</span> 
                <span class="toggle-link" id="toggleButton" onclick="alternarTela()">Criar nova conta</span>
            </div>
        </div>
    </div>

    <script>
        let modoRegisto = false;

        function alternarTela() {
            modoRegisto = !modoRegisto;
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const identityLabel = document.getElementById('identityLabel');
            const phoneContainer = document.getElementById('phoneContainer');
            const artistContainer = document.getElementById('artistCheckboxContainer');
            const btnAction = document.getElementById('btnAction');
            const toggleQuestion = document.getElementById('toggleQuestion');
            const toggleButton = document.getElementById('toggleButton');

            if (modoRegisto) {
                title.innerText = "Criar Conta no Oculus";
                subtitle.innerText = "Registe-se para ouvir ou carregar as suas produções.";
                identityLabel.innerText = "E-mail Principal";
                phoneContainer.style.display = "block";
                artistContainer.style.display = "flex";
                btnAction.innerText = "Registar";
                toggleQuestion.innerText = "Já tem uma conta?";
                toggleButton.innerText = "Entre por aqui";
            } else {
                title.innerText = "Entrar no Oculus";
                subtitle.innerText = "Aceda à sua conta de ouvinte, artista ou painel master.";
                identityLabel.innerText = "E-mail ou Telemóvel";
                phoneContainer.style.display = "none";
                artistContainer.style.display = "none";
                btnAction.innerText = "Entrar";
                toggleQuestion.innerText = "Novo no Oculus?";
                toggleButton.innerText = "Criar nova conta";
            }
        }

        // CONTROLADOR DE LOGINS E ENTRADAS
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loginInput = document.getElementById('userIdentity').value.trim().toLowerCase();
            const passwordInput = document.getElementById('userPassword').value;
            const checkArtista = document.getElementById('isArtistProfile').checked;

            if (modoRegisto) {
                if (checkArtista) {
                    alert("Perfil de Músico criado! A abrir o seu painel de rascunhos...");
                    window.location.href = "artista.html";
                } else {
                    alert("Conta de Ouvinte criada! Faça o seu login agora.");
                    alternarTela();
                }
            } else {
                // Verificação exata do administrador
                if (loginInput === "mpindinoelevogarcia61@gmail.com" && passwordInput === "Mpindi2026@") {
                    alert("Dono autenticado com sucesso! A abrir o Painel Supremo...");
                    window.location.href = "admin.html";
                } else {
                    alert("Login efetuado com sucesso para a área pública!");
                }
            }
        });
    </script>
</body>
</html>
