<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oculus - Painel do Artista</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #0c0c0c; color: #fff; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 30px; }
        h1 { color: #fff; font-size: 24px; }
        h1 span { color: #e50914; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        .card { background-color: #141414; padding: 25px; border-radius: 8px; border: 1px solid #222; margin-bottom: 20px; }
        .card-title { font-size: 18px; margin-bottom: 20px; color: #e5e5e5; border-left: 4px solid #e50914; padding-left: 10px; }
        
        /* Formulários */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"], textarea { width: 100%; padding: 10px; background-color: #0c0c0c; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 14px; }
        input:focus, textarea:focus { border-color: #e50914; outline: none; }
        
        /* Botões */
        .btn { width: 100%; padding: 12px; background-color: #e50914; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background-color: #b80710; }
        
        /* Contador Auditado */
        .stat-box { display: flex; justify-content: space-between; align-items: center; background-color: #0c0c0c; padding: 15px; border-radius: 4px; border-left: 4px solid #2ecc71; margin-bottom: 10px; }
        .stat-box.downloads { border-left-color: #3498db; }
        .stat-box span { font-size: 14px; color: #aaa; }
        .stat-box strong { font-size: 20px; color: #fff; }
        .info-concurso { font-size: 12px; color: #888; text-align: center; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <header>
        <h1>👁️ Oculus <span>Artista</span></h1>
        <div><strong>Conta:</strong> Verificada ✓</div>
    </header>

    <div class="grid">
        
        <!-- Coluna Esquerda: Perfil e Métricas Blindadas -->
        <div>
            <!-- Perfil -->
            <div class="card">
                <div class="card-title">Perfil Artístico</div>
                <div class="form-group">
                    <label>Nome Artístico</label>
                    <input type="text" value="Nome do Músico">
                </div>
                <div class="form-group">
                    <label>Biografia / História</label>
                    <textarea rows="4">Escreve a tua biografia aqui...</textarea>
                </div>
                <div class="form-group">
                    <label>Link da Foto (postagem.com)</label>
                    <input type="text" placeholder="https://postagem.com">
                </div>
                <button class="btn" style="background-color: #333;">Atualizar Perfil</button>
            </div>

            <!-- Métricas Anti-Batota para o Sorteio -->
            <div class="card">
                <div class="card-title">Métricas Sistema (Auditadas)</div>
                <div class="stat-box">
                    <span>Plays Reais (Únicos)</span>
                    <strong>0</strong>
                </div>
                <div class="stat-box downloads">
                    <span>Downloads Reais</span>
                    <strong>0</strong>
                </div>
                <small class="info-concurso">🔒 Sistema anti-spam ativo. Apenas cliques validados contam para o TOP 3 Publicidade.</small>
            </div>
        </div>

        <!-- Coluna Direita: Submissão de Músicas e Vídeos -->
        <div>
            <div class="card">
                <div class="card-title">Submeter Novo Conteúdo (Fila de Rascunhos)</div>
                <form>
                    <div class="form-group">
                        <label>Título da Obra</label>
                        <input type="text" placeholder="Ex: Minha Nova Música de Sucesso">
                    </div>
                    
                    <div class="form-group">
                        <label>Tipo de Conteúdo</label>
                        <input type="text" placeholder="musica ou video">
                    </div>

                    <div class="form-group">
                        <label>Link Direto do Áudio (Archive.org)</label>
                        <input type="text" placeholder="https://archive.org">
                    </div>

                    <div class="form-group">
                        <label>Link do Vídeo (YouTube, TikTok ou Facebook)</label>
                        <input type="text" placeholder="https://youtube.com...">
                    </div>

                    <div class="form-group">
                        <label>Link da Capa (postagem.com)</label>
                        <input type="text" placeholder="https://postagem.com">
                    </div>

                    <button type="button" class="btn">Enviar para Aprovação do Dono</button>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
